name: Pipeline CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── ETAPA 1: BUILD ──────────────────────────
  build:
    name: Compilar y preparar
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install pytest pytest-cov flake8

  # ── ETAPA 2: TEST ───────────────────────────
  test:
    name: Ejecutar pruebas
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pytest-cov

      - name: Correr pruebas con cobertura
        run: pytest test_app.py -v --cov=app --cov-report=term

  # ── ETAPA 3: CALIDAD ────────────────────────
  calidad:
    name: Analizar calidad del código
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8

      - name: Revisar estilo de código
        run: flake8 app.py --max-line-length=88

  # ── ETAPA 4: DEPLOY ─────────────────────────
  deploy:
    name: Simular despliegue
    runs-on: ubuntu-latest
    needs: calidad
    steps:
      - uses: actions/checkout@v4

      - name: Despliegue a producción
        run: |
          echo "✅ Build exitoso"
          echo "✅ Pruebas pasadas"
          echo "✅ Calidad verificada"
          echo "🚀 Desplegando versión a producción..."
          echo "✅ Despliegue completado"
